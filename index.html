<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Finder</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>

<!---------------------Header/Navbar---------------------->    
    <header class="border-botom bg-white">
      <nav class="navbar navbar-light">
        <div class="container reading-width">
          <a class="navbar-brand fw-semibold" href="#">Recipe Finder</a>
          <span class="text-muted small">
            The MealDB demo
          </span>
        </div>
      </nav>
    </header>

<!---------------------Main------------------->
    <main class="py-4">
      <div cllass="container reading-width">
        <section class=" card shadow-sm">
          <div class="card-body p-3 p-md-4">
            <h1 class="h4 mb-1">Find a reciepe</h1>
            <p class="text-muted mb-3">
              Search for meals, ingredients, instructions.
            </p>

            <form id="searchForm" class="mb-3">
              <div class="input-group">
                <input id="searchInput"
                  type="search"
                  class="form-control"
                  placeholder="Enter what you are looking for"
                  />
                <button
                  id="searchButton"
                  type="submit"
                  class="btn brn-primary"
                >
                  Search
                </button>

                <button
                  id="randomButton"
                  type="button"
                  class="btn btn-outline-secondary"
                  >
                    Random
                </button>
              </div>
            </form>
            
            <div
              id="status"
              class="alert alert-secondary d-none mb-3"
              role="status"
            >
              Status text here....
            </div>

            <section>
              <div id="resultsGrid"
              class="row g-3"
              >
              <!----------Placeholder will render later-->

                <div class="col-12 col-sm-6">
                  <button 
                    type="button"
                    class="card recipe-card w-100 text-start"
                    data-bs-toggle="modal"
                    data-bs-target="#recipeModal"
                  >
                    <img
                      class="card-img-top recipe-img"
                      src="https://www.themealdb.com/images/media/meals/llcbn01574260722.jpg"
                      alt="Recipe"
                    />
                    
                  <div class="card-body">
                    <h2 lass="h6 mb-1">
                      Penne
                    </h2>
                    <p class="text-muted small mb-0">
                      Vegetarian | Italian
                    </p>
                  </div>
                </button>
                </div>

                <div class="col-12 col-sm-6">
                  <button 
                    type="button"
                    class="card recipe-card w-100 text-start"
                    data-bs-toggle="modal"
                    data-bs-target="#recipeModal"
                  >
                    <img
                      class="card-img-top recipe-img"
                      src="https://www.themealdb.com/images/media/meals/llcbn01574260722.jpg"
                      alt="Recipe"
                    />
                    
                  <div class="card-body">
                    <h2 lass="h6 mb-1">
                      Penne
                    </h2>
                    <p class="text-muted small mb-0">
                      Chicken | Indian
                    </p>
                  </div>
                </button>
              </div>

            </div>
          </section>
        </div>
        
        <footer class="card-footer bg-white">
          <div class="d-flex justify-content-between">
            <span class="text-muted small">
              Typescript 
            </span>
            <span class="text-muted small">
              v1
            </span>
          </div>
        </footer>
      </section>
    </div>
  </main>
<!-------------Modal------------>
<div class="modal fade" 
    tabindex="-1"
    id="recipeModal">
  <div class="modal-dialog modal-lg modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title h5 mb-0"
            id="recipeModalLabel"
        >
          Recipe title
        </h2>
        <button type="button" class="btn-close" data-bs-dismiss="modal">
        </button>
      </div>


      <div class="modal-body">
        <div class="row g-3">
          <div class="col-12 col-md-5">
            <div class="ratio ratio-1x1">
              <img class="w-100 h-100 modal-img" 
                src="https://www.themealdb.com/images/media/meals/llcbn01574260722.jpg"
                alt="Recipe"
              />
            </div>

          <div class="mt-3">
            <span class="badge text-bg-light border">
              Category
            </span>
            <span class="badge text-bg-light border">
              Area
            </span>
          </div>
        </div>

        <div class="col-12 col-md-7">
          <h3 class="h6">Ingredients</h3>
          <div class="table-responsive">
            <table class="table table-sm">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Measure</th>
                </tr>
              </thead>
              <tbody>
                <tr>
                  <td>Penne Rigate</td>
                  <td>1 lb</td>
                </tr>
                <tr>
                  <td>Tomatoes</td>
                  <td>3 cups</td>
                </tr>
                <tr>
                  <td>Chili flakes</td>
                  <td>1 tsp</td>
                </tr>
              </tbody>
            </table>
          </div>

          <h3 class="h6 mt-3">Instructions</h3>
          <p class="text-muted mb-0"> API goes here</p>
        </div>
      </div>
    </div>
  </div>
  <!---------Modal Footer --------->
  <div class="modal-footer">
    <a class="btn btn-outline-secondary"
    href="#"
    target="_blank"
    rel="noopener noreferrer"
    >
    Source 
    </a>
    <a class="btn btn-danger"
    href="#"
    target="_blank"
    rel="noopener noreferrer"
    >
      YouTube
    </a>
  </div>
</div>
</div>
<script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
  </body>
</html>
